name: CI

on:
   push:
      branches:
         - main

   pull_request:
      branches:
         - main

jobs:
   lint:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v6
           with:
              fetch-depth: 0

         - uses: actions/setup-node@v6
           with:
              node-version: lts/*
              registry-url: https://registry.npmjs.org/

         - uses: pnpm/action-setup@v6

         - name: Install
           run: pnpm ci

         - name: Build
           run: pnpm build

         - name: Lint
           run: pnpm lint

         - name: Typecheck
           run: pnpm typecheck

   test:
      runs-on: ${{ matrix.os }}

      strategy:
         matrix:
            node: [lts/*]
            os: [ubuntu-latest, windows-latest, macos-latest]
         fail-fast: false

      steps:
         - uses: actions/checkout@v6
           with:
              fetch-depth: 0

         - uses: actions/setup-node@v6
           with:
              node-version: lts/*
              registry-url: https://registry.npmjs.org/

         - uses: pnpm/action-setup@v6

         - name: Install
           run: pnpm ci

         - name: Test
           run: pnpm test
